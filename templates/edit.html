<!doctype html>
<html>
  <head>
    <title>Edit Product</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f6fa;
        margin: 40px;
      }

      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #2f3640;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      label {
        font-weight: bold;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #0984e3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background-color: #74b9ff;
      }

      .back {
        margin-top: 10px;
        text-align: center;
      }

      .back a {
        text-decoration: none;
        color: #636e72;
      }

      .error {
        color: red;
        margin-bottom: 10px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>✏️ Edit Product</h1>

      {{if .Error}}
      <!-- ERROR VIEW -->
      <div class="error-box">
        <h2>⚠️ Something went wrong</h2>
        <p>{{.Error}}</p>

        <div class="back">
          <a href="/">⬅ Back to Home</a>
        </div>
      </div>

      {{else}}
      <!-- FORM VIEW -->
      <form action="/update" method="POST">
        <label>ID</label>
        <input type="text" name="id" value="{{.Product.Id}}" readonly />

        <label>Name</label>
        <input type="text" name="name" value="{{.Product.Name}}" required />

        <label>Price</label>
        <input
          type="text"
          inputmode="numeric"
          name="price"
          value="{{.Product.Price}}"
          required
        />

        <label>Stock</label>
        <input
          type="text"
          inputmode="numeric"
          name="stock"
          value="{{.Product.Stock}}"
          required
        />

        <button type="submit">Update Product</button>
      </form>
      {{end}}
      <div class="back">
        <a href="/">⬅ Back to Home</a>
      </div>
    </div>
  </body>
</html>
