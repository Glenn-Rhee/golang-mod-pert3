<!doctype html>
<html>
  <head>
    <title>Product CRUD</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f5f6fa;
      }

      h1 {
        color: #2f3640;
      }

      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      form input {
        padding: 8px;
        margin: 5px;
        width: 180px;
      }

      button {
        padding: 8px 12px;
        border: none;
        background-color: #0984e3;
        color: white;
        cursor: pointer;
        border-radius: 4px;
      }

      button:hover {
        background-color: #74b9ff;
      }

      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }

      table,
      th,
      td {
        border: 1px solid #dcdde1;
      }

      th {
        background-color: #273c75;
        color: white;
        padding: 10px;
      }

      td {
        padding: 8px;
        text-align: center;
      }

      .delete {
        background-color: #e84118;
      }

      .edit {
        background-color: #fbc531;
        color: black;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📦 Product Management VM Lepkom</h1>

      <h3>Add Product</h3>
      {{if .Error}}
      <p style="color: red">{{.Error}}</p>
      {{end}}
      <form action="/create" method="POST" id="create">
        <input type="text" name="id" placeholder="ID" required />
        <input type="text" name="name" placeholder="Name" required />
        <input
          type="string"
          inputmode="numeric"
          name="price"
          placeholder="Price"
          required
        />
        <input
          type="string"
          inputmode="numeric"
          name="stock"
          placeholder="Stock"
          required
        />
        <button type="submit">Add</button>
      </form>

      <h3>Product List</h3>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          {{range .Products}}
          <tr>
            <td>{{.Id}}</td>
            <td>{{.Name}}</td>
            <td>{{.Price}}</td>
            <td>{{.Stock}}</td>

            <td>
              <!-- UPDATE -->
              <form action="/edit" method="GET" style="display: inline">
                <input type="hidden" name="id" value="{{.Id}}" />
                <button class="edit">Edit</button>
              </form>

              <!-- DELETE -->
              <form
                action="/delete"
                method="POST"
                onsubmit="
                  return confirm('Are you sure want delete this item?');
                "
                style="display: inline"
              >
                <input type="hidden" name="id" value="{{.Id}}" />
                <button class="delete">Delete</button>
              </form>
            </td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </body>
</html>
