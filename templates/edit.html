<!doctype html>
<html>
  <head>
    <title>Edit Product</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f6fa;
        margin: 40px;
      }

      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #2f3640;
      }

      input {
        width: calc(100% - 2rem);
        padding: 10px;
        margin-top: 8px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      label {
        font-weight: bold;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #0984e3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background-color: #74b9ff;
      }

      .back {
        margin-top: 10px;
        text-align: center;
      }

      .back a {
        text-decoration: none;
        color: #636e72;
      }

      .error {
        color: red;
        margin-bottom: 10px;
        text-align: center;
      }

      .image-preview {
        text-align: center;
        margin-bottom: 15px;
      }

      .image-preview img {
        max-width: 150px;
        border-radius: 6px;
        margin-top: 8px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
      }

      .checkbox-wrapper {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }

      .checkbox-wrapper input {
        width: auto;
        margin-right: 8px;
      }

      .input-group {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>✏️ Edit Product</h1>

      {{if .Error}}
      <!-- ERROR VIEW -->
      <div class="error-box">
        <h2>⚠️ Something went wrong</h2>
        <p>{{.Error}}</p>

        <div class="back">
          <a href="/">⬅ Back to Home</a>
        </div>
      </div>

      {{else}}
      <form action="/update" method="POST" enctype="multipart/form-data">
        <div class="input-group">
          <div>
            <label>ID</label>
            <input type="text" name="id" value="{{.Product.Id}}" readonly />
          </div>

          <div>
            <label>Name</label>
            <input type="text" name="name" value="{{.Product.Name}}" required />
          </div>

          <div>
            <label>Price</label>
            <input
              type="number"
              inputmode="numeric"
              name="price"
              value="{{.Product.Price}}"
              required
            />
          </div>

          <div>
            <label>Stock</label>
            <input
              type="number"
              inputmode="numeric"
              name="stock"
              value="{{.Product.Stock}}"
              required
            />
          </div>
        </div>

        <!-- IS ACTIVE -->
        <label class="checkbox-wrapper">
          <input
            type="checkbox"
            name="is_active"
            {{if
            .Product.IsActive}}checked{{end}}
          />
          Active Product
        </label>

        <!-- CREATED AT -->
        <label>Created At</label>
        <input type="text" value="{{.Product.CreatedAt}}" readonly disabled />

        <!-- CURRENT IMAGE -->
        <div class="image-preview">
          <label>Current Image</label><br />
          <img src="/image?id={{.Product.Id}}" />
        </div>

        <!-- UPLOAD NEW IMAGE -->
        <label>Change Image (optional)</label>
        <input type="file" name="image" accept="image/*" />

        <button type="submit">Update Product</button>
      </form>
      <div class="back">
        <a href="/">⬅ Back to Home</a>
      </div>
      {{end}}
    </div>
  </body>
</html>
